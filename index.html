<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROSA Productos Digitales</title>
  <link rel="icon" href="imágenes/icono.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --fondo:       #f9ece8;
      --rosa-medio:  #e8a898;
      --dorado:      #c9a96e;
      --texto:       #6b5b52;
      --dorado-txt:  #b8864e;
    }

    body {
      background-color: var(--fondo);
      color: var(--texto);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── HEADER ─── */
    header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 0;
      gap: 24px;
    }

    .logo-wrap img {
      height: 90px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(180, 130, 100, 0.25));
    }

    .banner-wrap {
      width: 100%;
      max-width: 680px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(180, 130, 100, 0.18);
    }

    .banner-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ─── TAGLINE ─── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 4vw, 1.75rem);
      font-weight: 300;
      font-style: italic;
      color: var(--dorado-txt);
      text-align: center;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    /* ─── LINKS SECTION ─── */
    main {
      width: 100%;
      max-width: 480px;
      padding: 32px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(180, 130, 100, 0.28);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Variante principal — dorado */
    .btn-dorado {
      background: linear-gradient(135deg, #c9a96e 0%, #d4b882 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(180, 130, 100, 0.22);
    }

    /* Variante secundaria — rosa */
    .btn-rosa {
      background: linear-gradient(135deg, #e8a898 0%, #efb9ab 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(232, 168, 152, 0.28);
    }

    /* Variante outline */
    .btn-outline {
      background: transparent;
      border: 2px solid var(--dorado);
      color: var(--dorado-txt);
      box-shadow: 0 2px 10px rgba(180, 130, 100, 0.10);
    }

    .btn-outline:hover {
      background: rgba(201, 169, 110, 0.08);
    }

    /* Iconos SVG inline */
    .btn svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Separador decorativo */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--rosa-medio);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      margin: 4px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--rosa-medio), transparent);
    }

    /* ─── FOOTER ─── */
    footer {
      margin-top: auto;
      padding: 24px 20px 36px;
      text-align: center;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--dorado-txt);
      letter-spacing: 0.03em;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--rosa-medio);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 400px) {
      header { padding: 24px 16px 0; }
      main { padding: 24px 16px 32px; gap: 12px; }
      .btn { font-size: 0.88rem; padding: 14px 20px; }
    }
  </style>
</head>
<body>
